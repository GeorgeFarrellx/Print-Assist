name: Build EXE

on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m venv .venv
        .venv\Scripts\python.exe -m pip install --upgrade pip
        .venv\Scripts\python.exe -m pip install -r requirements.txt pyinstaller
    
    - name: Build one-folder app with PyInstaller spec
      run: |
        .venv\Scripts\python.exe -m PyInstaller --noconfirm --clean PrintAssist.spec
    
    - name: Upload app folder artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrintAssist-windows-folder
        path: dist/PrintAssist
